[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "java -jar /app/app.jar"
healthcheckPath = "/api/ordenes/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.env]]
DATABASE_URL = "jdbc:postgresql://YOUR_RAILWAY_DB_HOST:5432/db_produccion"
DATABASE_USERNAME = "adriano"
DATABASE_PASSWORD = "password123"
SPRING_APP_NAME = "db_produccion"
SERVER_PORT = "8083"
JPA_SHOW_SQL = "false"